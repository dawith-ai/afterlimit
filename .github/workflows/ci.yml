name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest   # 이 도구는 macOS 전용
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Syntax check (all scripts, stdlib only)
        run: python -m py_compile scripts/*.py
      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pytest -q tests/
